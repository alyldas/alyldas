name: Update profile summary

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate profile summary cards
        run: |
          mkdir -p profile-summary-card-output
          base_url="https://github-profile-summary-cards.vercel.app/api/cards"
          username="${{ github.repository_owner }}"
          theme="transparent"

          curl -fsSL "${base_url}/profile-details?username=${username}&theme=${theme}" -o profile-summary-card-output/profile-details.svg
          curl -fsSL "${base_url}/repos-per-language?username=${username}&theme=${theme}" -o profile-summary-card-output/repos-per-language.svg
          curl -fsSL "${base_url}/most-commit-language?username=${username}&theme=${theme}" -o profile-summary-card-output/most-commit-language.svg
          curl -fsSL "${base_url}/productive-time?username=${username}&theme=${theme}&utcOffset=3" -o profile-summary-card-output/productive-time.svg
          curl -fsSL "${base_url}/stats?username=${username}&theme=${theme}" -o profile-summary-card-output/stats.svg

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "Update profile summary"
          git push
